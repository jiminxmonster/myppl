events {}

http {
  # 업로드 이미지(히어로 슬라이드 등) 413 에러 방지
  client_max_body_size 20M;
  client_body_buffer_size 16k;

  server {
    listen 80;
    server_name yourdomain.com;

    # API 요청은 Django 백엔드로 전달한다.
    location /api/ {
      proxy_pass http://backend:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 관리자 페이지도 백엔드로 전달한다.
    location /admin/ {
      proxy_pass http://backend:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 미디어 파일은 Nginx가 Docker volume에서 직접 정적 서빙 (Django 우회, 성능/이식성)
    # docker-compose에서 nginx에도 media_data 볼륨이 마운트되어 있어야 함 (/var/www/media)
    location /media/ {
      alias /var/www/media/;
      autoindex off;
      expires 30d;
      add_header Cache-Control "public, immutable";
      add_header X-Content-Type-Options nosniff;
    }

    # 일반 웹 페이지 요청은 Next.js 프론트엔드로 전달한다.
    location / {
      proxy_pass http://frontend:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
