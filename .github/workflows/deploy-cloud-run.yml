name: Deploy Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  REGION: asia-northeast3
  REPOSITORY: comunitysite
  BACKEND_SERVICE: myppl-backend-temp
  FRONTEND_SERVICE: myppl-frontend-temp

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          BACKEND_IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}"
          docker build -t "$BACKEND_IMAGE" ./backend
          docker push "$BACKEND_IMAGE"
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> $GITHUB_ENV

      - name: Build and push frontend image
        run: |
          FRONTEND_IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_INTERNAL_API_URL="${{ secrets.NEXT_INTERNAL_API_URL }}" \
            --build-arg NEXT_PUBLIC_WS_URL="${{ secrets.NEXT_PUBLIC_WS_URL }}" \
            -t "$FRONTEND_IMAGE" ./frontend
          docker push "$FRONTEND_IMAGE"
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> $GITHUB_ENV

      - name: Deploy backend
        run: |
          # myppl-backend-temp (개발/테스트용) 는 RUN_BOOTSTRAP 절대 주입하지 않음.
          # admin 설정(메뉴, hero, sections 등)이 리플래쉬/deploy 로 날아가는 것 방지.
          # RUN_MIGRATIONS=1 은 스키마 업데이트용으로만.
          gcloud run deploy "${{ env.BACKEND_SERVICE }}" \
            --image "$BACKEND_IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --add-cloudsql-instances "${{ secrets.CLOUDSQL_CONNECTION_NAME }}" \
            --set-env-vars "DJANGO_SETTINGS_MODULE=config.settings.production,DEBUG=False,SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }},ALLOWED_HOSTS=*,CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }},DB_HOST=/cloudsql/${{ secrets.CLOUDSQL_CONNECTION_NAME }},DB_NAME=${{ secrets.DB_NAME }},DB_USER=${{ secrets.DB_USER }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},USE_GCS_STORAGE=True,GS_BUCKET_NAME=${{ secrets.GS_BUCKET_NAME }},GS_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},RUN_MIGRATIONS=1"

      - name: Deploy frontend
        run: |
          gcloud run deploy "${{ env.FRONTEND_SERVICE }}" \
            --image "$FRONTEND_IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --set-env-vars "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }},NEXT_INTERNAL_API_URL=${{ secrets.NEXT_INTERNAL_API_URL }},NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}"
