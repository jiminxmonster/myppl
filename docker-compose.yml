# MYPPL Docker Compose (개발 + 운영 스택)
# 
# 개발: docker compose up (로컬 전체 스택)
# 운영 (VM/Vultr 목표): 동일 compose 사용. 이미지 빌드 또는 pull 후 up.
# 
# 철학:
# - GitHub = 코드 원본
# - PostgreSQL = 데이터 원본 (Admin이 운영 데이터 관리)
# - bootstrap 은 최초 설치/빈 DB용. 운영 DB 절대 덮어쓰지 않음 (RUN_BOOTSTRAP=0 기본)
#
# 사용법 (프로덕션-like):
#   cp .env.example .env   # 실제 비밀값 채우기
#   docker compose build
#   docker compose up -d
#
# 데이터 영속: postgres_data, media_data 볼륨
# Cloud SQL 이전 후에는 로컬/VM postgres 볼륨 사용

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: community_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # 프로덕션에서는 호스트 노출 최소화 (필요 시 DB_EXPOSE_PORT=0 또는 제거)
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d community_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    # 프로덕션: Dockerfile CMD (daphne) 사용. 개발 시에만 아래 command override
    # command: python manage.py runserver 0.0.0.0:8000
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "1"
      RUN_BOOTSTRAP: "0"   # 운영 DB 보호 (지시서 철학)
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # 프로덕션 배포 시 코드 볼륨 마운트 제거하고 이미지 사용 권장
      - ./backend:/app
      - media_data:/app/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  celery:
    build: ./backend
    command: celery -A config worker -l info
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  celery-beat:
    build: ./backend
    command: celery -A config beat -l info
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    # 프로덕션: Dockerfile CMD (npm start) 사용. dev 모드 강제 주석 처리 (안정성)
    # command: npm run dev   # 로컬 개발 시에만 임시 사용
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Direct static media serving (bypass Django). Must match alias in nginx.conf
      - media_data:/var/www/media
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
