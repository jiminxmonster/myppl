services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: community_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d community_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "1"
      RUN_BOOTSTRAP: "1"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  celery:
    build: ./backend
    command: celery -A config worker -l info
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
    volumes:
      - ./backend:/app

  celery-beat:
    build: ./backend
    command: celery -A config beat -l info
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    command: npm run dev
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  media_data:
